name: Build and Push Supporting Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-kubectl:
    runs-on: ubuntu-latest
    name: Build kubectl Image
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set lowercase image name
        id: image
        run: echo "name=${REGISTRY}/$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')/kubectl" >> "$GITHUB_OUTPUT"
        env:
          REGISTRY: ${{ env.REGISTRY }}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Bitnami containers at latest
        uses: actions/checkout@v4
        with:
          repository: bitnami/containers
          path: bitnami-containers

      - name: Build and push kubectl Image
        uses: docker/build-push-action@v6
        with:
          context: bitnami-containers/bitnami/kubectl/1.35/debian-12
          push: true
          tags: ${{ steps.image.outputs.name }}:latest

  build-os-shell:
    runs-on: ubuntu-latest
    name: Build OS Shell Image
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set lowercase image name
        id: image
        run: echo "name=${REGISTRY}/$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')/os-shell" >> "$GITHUB_OUTPUT"
        env:
          REGISTRY: ${{ env.REGISTRY }}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Bitnami containers at latest
        uses: actions/checkout@v4
        with:
          repository: bitnami/containers
          path: bitnami-containers

      - name: Build and push OS Shell Image
        uses: docker/build-push-action@v6
        with:
          context: bitnami-containers/bitnami/os-shell/12/debian-12
          push: true
          tags: ${{ steps.image.outputs.name }}:latest

  build-postgres-exporter:
    runs-on: ubuntu-latest
    name: Build PostgreSQL Exporter Image
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set lowercase image name
        id: image
        run: echo "name=${REGISTRY}/$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')/postgres-exporter" >> "$GITHUB_OUTPUT"
        env:
          REGISTRY: ${{ env.REGISTRY }}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Bitnami containers at latest
        uses: actions/checkout@v4
        with:
          repository: bitnami/containers
          path: bitnami-containers

      - name: Build and push PostgreSQL Exporter Image
        uses: docker/build-push-action@v6
        with:
          context: bitnami-containers/bitnami/postgres-exporter/0/debian-12
          push: true
          tags: ${{ steps.image.outputs.name }}:latest

