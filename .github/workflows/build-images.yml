          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push kubectl Image
        uses: docker/build-push-action@v5
        with:
          context: bitnami/kubectl/1.35/debian-12
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/bitnami/kubectl:latest
            ${{ env.REGISTRY }}/${{ env.ORG }}/bitnami/kubectl:${{ github.sha }}

