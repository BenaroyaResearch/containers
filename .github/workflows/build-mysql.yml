name: Build and Push MySQL Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-8-4-3-debian-12-r5:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      # bitnami/containers commit for MySQL 8.4.3-debian-12-r5
      BITNAMI_CONTAINERS_COMMIT: dc995e3c07e9963c58f56437fa2a5344e0d9a4ee
      MYSQL_IMAGE_TAG: 8.4.3-debian-12-r5

    steps:
      - name: Set lowercase image name
        id: image
        run: echo "name=${REGISTRY}/$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')/mysql" >> "$GITHUB_OUTPUT"
        env:
          REGISTRY: ${{ env.REGISTRY }}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Bitnami containers at MySQL 8.4.3-debian-12-r5
        uses: actions/checkout@v4
        with:
          repository: bitnami/containers
          ref: ${{ env.BITNAMI_CONTAINERS_COMMIT }}
          path: bitnami-containers

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: bitnami-containers/bitnami/mysql/8.4/debian-12
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ env.MYSQL_IMAGE_TAG }}
            ${{ steps.image.outputs.name }}:8.4.3-debian-12

  build-and-push-8-4-5-debian-12-r0:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      # bitnami/containers commit for MySQL 8.4.5-debian-12-r0
      BITNAMI_CONTAINERS_COMMIT: 202d64b464595a320f3a4ac7990fba1ce5ab1944
      MYSQL_IMAGE_TAG: 8.4.5-debian-12-r0

    steps:
      - name: Set lowercase image name
        id: image
        run: echo "name=${REGISTRY}/$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')/mysql" >> "$GITHUB_OUTPUT"
        env:
          REGISTRY: ${{ env.REGISTRY }}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Bitnami containers at MySQL 8.4.5-debian-12-r0
        uses: actions/checkout@v4
        with:
          repository: bitnami/containers
          ref: ${{ env.BITNAMI_CONTAINERS_COMMIT }}
          path: bitnami-containers

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: bitnami-containers/bitnami/mysql/8.4/debian-12
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ env.MYSQL_IMAGE_TAG }}
            ${{ steps.image.outputs.name }}:8.4.5-debian-12
            ${{ steps.image.outputs.name }}:latest
